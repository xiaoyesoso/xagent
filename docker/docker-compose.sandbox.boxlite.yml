services:
  backend:
    environment:
      - SANDBOX_ENABLED=true
      - SANDBOX_IMPLEMENTATION=boxlite
      - SANDBOX_IMAGE=xprobe/xagent-sandbox:0.4.2
      - SANDBOX_CPUS=1
      - SANDBOX_MEMORY=512
      - BOXLITE_HOME_DIR=/root/.xagent/boxlite
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
